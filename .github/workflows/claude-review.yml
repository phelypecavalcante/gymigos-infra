name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  haiku-triage:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are doing a FAST TRIAGE of a pull request for gymigos-infra (Docker Compose, infrastructure configs).

            Check only for these blockers — stop and request changes immediately if any are found:
            1. PR is larger than 200 lines changed (run `gh pr diff $PR_NUMBER --repo $REPO | wc -l`)
            2. Secrets, passwords, or API keys hardcoded in any file (docker-compose, .env files, configs)
            3. Public port exposure for internal-only services (e.g. PostgreSQL exposed on 0.0.0.0)
            4. Missing restart policies on long-running services

            If ALL checks pass: run `gh pr review $PR_NUMBER --repo $REPO --approve --body "Haiku triage passed. Escalating to deep review."`
            If ANY check fails: run `gh pr review $PR_NUMBER --repo $REPO --request-changes --body "<list each issue found>"`

            Use:
              PR_NUMBER: ${{ github.event.pull_request.number }}
              REPO: ${{ github.repository }}
          claude_args: "--max-turns 5 --model claude-haiku-4-5-20251001"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check triage decision
        id: check
        run: |
          sleep 3
          DECISION=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json reviewDecision --jq '.reviewDecision')
          echo "approved=$([[ "$DECISION" == "APPROVED" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonnet-review:
    needs: haiku-triage
    if: needs.haiku-triage.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are doing a DEEP REVIEW of a pull request for gymigos-infra. Haiku triage already passed basic checks.

            Manages Docker Compose for local dev (db, api with Air, web with Vite HMR) and any cloud/production infra.
            TLS terminated at reverse proxy (Nginx/Caddy/Traefik), not in the app.

            Review for:
            1. Security — no hardcoded secrets; env vars via .env files (gitignored) or secrets managers
            2. Docker — images pinned to specific versions, health checks present, non-root users where possible
            3. Networking — only necessary ports exposed publicly; internal services communicate on Docker network
            4. Reliability — restart policies, named volumes for data persistence, correct depends_on with condition
            5. TLS — Secure cookie flag gated on APP_ENV; cert renewal automated (ACME/Let's Encrypt)
            6. Drift — service names, ports, and env vars consistent with what gymigos-api/web/mobile expect
            7. Docs — README updated if local dev setup or service topology changed

            After your review, decide:
            - If approved: run `gh pr review $PR_NUMBER --repo $REPO --approve --body "<summary of what looks good>"`
            - If changes needed: run `gh pr review $PR_NUMBER --repo $REPO --request-changes --body "<detailed feedback per issue>"`

            Use:
              PR_NUMBER: ${{ github.event.pull_request.number }}
              REPO: ${{ github.repository }}
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
