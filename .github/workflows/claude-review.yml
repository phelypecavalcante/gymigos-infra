name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

env:
  REPO_NAME: "gymigos-infra"
  REPO_CONTEXT: |
    Manages Docker Compose for local dev (db: PostgreSQL, api: gymigos-api with Air hot-reload, web: gymigos-web with Vite HMR) and any cloud/production infra.
    TLS terminated at reverse proxy (Nginx, Caddy, or Traefik) — never in the Go app.
    Secrets via .env files (gitignored) or secrets managers, never hardcoded.
    APP_ENV controls production vs dev behaviour (e.g. Secure cookie flag).

jobs:
  haiku-triage:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch prompts from muninn
        env:
          GH_TOKEN: ${{ secrets.MUNINN_PAT }}
        run: |
          mkdir -p .muninn
          gh api repos/phelypecavalcante/muninn/contents/review-prompts/infra/triage.md \
            --header "Accept: application/vnd.github.raw+json" \
            > .muninn/triage.md
          gh api repos/phelypecavalcante/muninn/contents/review-prompts/infra/deep.md \
            --header "Accept: application/vnd.github.raw+json" \
            > .muninn/deep.md

      - name: Pre-compute triage facts
        id: triage-facts
        run: |
          FILTERED_DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} | awk '/^diff --git / { skip = ($0 ~ /package-lock\.json|yarn\.lock|pubspec\.lock|go\.sum|\.md b\//) } !skip')
          LINE_COUNT=$(echo "$FILTERED_DIFF" | wc -l)
          echo "line_count=$LINE_COUNT" >> $GITHUB_OUTPUT
          {
            echo 'diff<<__MUNINN_END__'
            echo "$FILTERED_DIFF"
            echo '__MUNINN_END__'
          } >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load triage prompt
        id: triage-prompt
        env:
          LINE_COUNT: ${{ steps.triage-facts.outputs.line_count }}
          PR_DIFF: ${{ steps.triage-facts.outputs.diff }}
        run: |
          {
            echo 'prompt<<__MUNINN_END__'
            PR_NUMBER="${{ github.event.pull_request.number }}" \
            REPO="${{ github.repository }}" \
            REPO_NAME="$REPO_NAME" \
            REPO_CONTEXT="$REPO_CONTEXT" \
            LINE_COUNT="$LINE_COUNT" \
            envsubst '${PR_NUMBER} ${REPO} ${REPO_NAME} ${REPO_CONTEXT} ${LINE_COUNT}' \
              < .muninn/triage.md
            echo ''
            echo '## Full Diff'
            echo "$PR_DIFF"
            echo '__MUNINN_END__'
          } >> $GITHUB_OUTPUT

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.triage-prompt.outputs.prompt }}
          claude_args: "--max-turns 3 --model claude-haiku-4-5-20251001 --allowedTools Bash(gh:*)"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check triage decision
        id: check
        run: |
          PASSED=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json comments --jq '[.comments[].body] | any(.[]; contains("TRIAGE_PASSED"))')
          echo "approved=$PASSED" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonnet-review:
    needs: haiku-triage
    if: needs.haiku-triage.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch prompts from muninn
        env:
          GH_TOKEN: ${{ secrets.MUNINN_PAT }}
        run: |
          mkdir -p .muninn
          gh api repos/phelypecavalcante/muninn/contents/review-prompts/infra/deep.md \
            --header "Accept: application/vnd.github.raw+json" \
            > .muninn/deep.md

      - name: Pre-fetch PR content
        id: pr-content
        run: |
          {
            echo 'diff<<__MUNINN_END__'
            gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} | awk '/^diff --git / { skip = ($0 ~ /package-lock\.json|yarn\.lock|pubspec\.lock|go\.sum|\.md b\//) } !skip'
            echo '__MUNINN_END__'
          } >> $GITHUB_OUTPUT
          {
            echo 'body<<__MUNINN_END__'
            gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json body --jq '.body'
            echo '__MUNINN_END__'
          } >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load deep review prompt
        id: deep-prompt
        env:
          PR_DIFF: ${{ steps.pr-content.outputs.diff }}
          PR_BODY: ${{ steps.pr-content.outputs.body }}
        run: |
          {
            echo 'prompt<<__MUNINN_END__'
            PR_NUMBER="${{ github.event.pull_request.number }}" \
            REPO="${{ github.repository }}" \
            REPO_NAME="$REPO_NAME" \
            REPO_CONTEXT="$REPO_CONTEXT" \
            envsubst '${PR_NUMBER} ${REPO} ${REPO_NAME} ${REPO_CONTEXT}' \
              < .muninn/deep.md
            echo ''
            echo '## Pull Request Description'
            echo "$PR_BODY"
            echo ''
            echo '## Full Diff'
            echo "$PR_DIFF"
            echo '__MUNINN_END__'
          } >> $GITHUB_OUTPUT

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.deep-prompt.outputs.prompt }}
          claude_args: "--max-turns 3 --model claude-sonnet-4-6 --allowedTools Bash(gh:*)"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
